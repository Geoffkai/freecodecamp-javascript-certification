<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Weather App</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>

  <body>
  <div class="page">
    <div id="weather-container">
      <h2 id="location"></h2>

      <div class="top-row">
        <p id="main-temperature"></p>
        <div class="weather-type">
          <img id="weather-icon" alt="weather icon" />
          <p id="weather-main"></p>
        </div>
      </div>

      <div class="bottom-row">
        <div class="details">
          <p id="humidity"></p>
          <p id="feels-like"></p>
          <p id="wind"></p>
          <p id="wind-gust"></p>
        </div>
        <div class="compass">
          <svg viewBox="0 0 100 100" width="120" height="120">
            <circle cx="50" cy="50" r="45" fill="none" stroke="currentColor" stroke-width="2" />
            <line x1="50" y1="5" x2="50" y2="12" stroke="currentColor" stroke-width="2" />
            <line x1="95" y1="50" x2="88" y2="50" stroke="currentColor" stroke-width="2" />
            <line x1="50" y1="95" x2="50" y2="88" stroke="currentColor" stroke-width="2" />
            <line x1="5" y1="50" x2="12" y2="50" stroke="currentColor" stroke-width="2" />
            <g id="wind-arrow" style="transform-origin: 50px 50px;">
              <line x1="50" y1="50" x2="50" y2="18" stroke="currentColor" stroke-width="2" />
              <polygon points="50,12 46,22 54,22" fill="currentColor" />
            </g>
          </svg>
        </div>
      </div>
    </div>

    <div class="controls">
      <span class="controls-label">Weather for:</span>
      <select id="city-options">
        <option value=""></option>
        <option value="new york">New York</option>
        <option value="los angeles">Los Angeles</option>
        <option value="chicago">Chicago</option>
        <option value="paris">Paris</option>
        <option value="tokyo">Tokyo</option>
        <option value="london">London</option>
      </select>
      <button id="get-weather-btn">Get Weather</button>
    </div>
  </div>

  <script src="./script.js"></script>
</body>
</html>
